services:
  postgres:
    image: postgres:16-alpine
    container_name: glance-db
    environment:
      POSTGRES_USER: glance
      POSTGRES_PASSWORD: glance_password
      POSTGRES_DB: glance
    ports:
      - "5432:5432"
    volumes:
      - glance_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glance -d glance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  glance_pg_data:
